<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reset Memory — Bot Dra. Raquel</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .container {
    max-width: 480px;
    width: 100%;
  }
  h1 {
    font-size: 22px;
    margin-bottom: 8px;
    font-weight: 600;
  }
  .subtitle {
    color: #94a3b8;
    margin-bottom: 32px;
    font-size: 14px;
  }
  .btn {
    width: 100%;
    padding: 18px 24px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 12px;
    transition: transform 0.05s, opacity 0.2s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    color: white;
  }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-lucas { background: #2563eb; }
  .btn-lucas:hover { background: #1d4ed8; }
  .btn-valentino { background: #7c3aed; }
  .btn-valentino:hover { background: #6d28d9; }
  .btn-both { background: #dc2626; }
  .btn-both:hover { background: #b91c1c; }
  .phone {
    font-family: 'SF Mono', Monaco, Consolas, monospace;
    font-size: 12px;
    opacity: 0.7;
  }
  #log {
    margin-top: 24px;
    padding: 16px;
    background: #1e293b;
    border-radius: 8px;
    font-family: 'SF Mono', Monaco, Consolas, monospace;
    font-size: 13px;
    min-height: 80px;
    white-space: pre-wrap;
    color: #cbd5e1;
  }
  .log-entry { margin-bottom: 6px; }
  .log-ok { color: #4ade80; }
  .log-err { color: #f87171; }
  .log-loading { color: #fbbf24; }
</style>
</head>
<body>
  <div class="container">
    <h1>🧹 Reset Memory — Bot Dra. Raquel</h1>
    <p class="subtitle">Borra <code>n8n_chat_histories</code> del paciente seleccionado. Whitelist hardcoded en n8n.</p>

    <button class="btn btn-lucas" onclick="reset('5491161461034', 'Lucas')">
      <span>Reset Lucas</span>
      <span class="phone">5491161461034</span>
    </button>

    <button class="btn btn-valentino" onclick="reset('5492216145776', 'Valentino')">
      <span>Reset Valentino</span>
      <span class="phone">5492216145776</span>
    </button>

    <button class="btn btn-both" onclick="resetBoth()">
      <span>🔥 Reset AMBOS</span>
      <span class="phone">Lucas + Valentino</span>
    </button>

    <div id="log">Apretá un botón para empezar.</div>
  </div>

<script>
const URL = 'https://n8n.raquelrodriguez.com.ar/webhook/reset-memory';
const logEl = document.getElementById('log');

function log(msg, cls) {
  const entry = document.createElement('div');
  entry.className = 'log-entry ' + (cls || '');
  const ts = new Date().toTimeString().slice(0, 8);
  entry.textContent = `[${ts}] ${msg}`;
  logEl.insertBefore(entry, logEl.firstChild);
}

async function reset(phone, name) {
  log(`Borrando memoria de ${name}...`, 'log-loading');
  try {
    const r = await fetch(URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone })
    });
    const data = await r.json();
    if (data.status === 'ok') {
      log(`✅ ${data.message}`, 'log-ok');
    } else {
      log(`❌ ${name}: ${JSON.stringify(data)}`, 'log-err');
    }
  } catch (e) {
    log(`❌ ${name}: ${e.message}`, 'log-err');
  }
}

async function resetBoth() {
  await reset('5491161461034', 'Lucas');
  await reset('5492216145776', 'Valentino');
}
</script>
</body>
</html>
